name: Trivy SCA & Container Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  scans:
    name: Dependency & Container Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner in fs mode (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Build an image from Dockerfile
        run: docker build -t vulnerable-app:latest .

      - name: Run Trivy vulnerability scanner on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vulnerable-app:latest'
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          
      - name: Send Discord Alert if Vulnerabilities Found
        if: failure()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USERNAME: "DevSecOps Bot"
          DISCORD_AVATAR: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
        with:
          args: "🚨 **SCA Alert:** Trivy detected critical dependency or container CVEs. Review the GitHub Actions logs immediately!"
